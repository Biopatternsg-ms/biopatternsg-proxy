version: '3.8'
services:
  nginx:
    build: .
    container_name: biopatternsg-proxy
    ports:
      - "80:80"   # Necesario para la redirección HTTP -> HTTPS
      - "443:443" # Tráfico seguro
    volumes:
      # 1. Montamos tu config en la carpeta de autollamado de Nginx
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      
      # 2. Montamos los certificados usando las rutas de Jenkins
      # Estas variables vienen del comando 'sh' en tu Jenkinsfile
      - ${NGINX_CRT}:/etc/nginx/ssl/server.crt:ro
      - ${NGINX_KEY}:/etc/nginx/ssl/server.key:ro
    networks:
      - general-network

networks:
  general-network:
    external: true